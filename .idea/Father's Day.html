<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>老爸，节日快乐</title>
    <style>
        /* ===== 样式（不用改） ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(160deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 20px;
            overflow: hidden;
        }
        .glow {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,215,0,0.3), transparent 70%);
            pointer-events: none;
            animation: drift linear infinite;
            z-index: 0;
        }
        @keyframes drift {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }
        .card {
            position: relative;
            z-index: 1;
            max-width: 560px;
            width: 100%;
            background: rgba(255,248,240,0.06);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,215,150,0.15);
            border-radius: 40px;
            padding: 44px 36px 40px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
            text-align: center;
            animation: fadeSlide 1s ease-out forwards;
            opacity: 0;
            transform: translateY(30px);
        }
        @keyframes fadeSlide {
            to { opacity: 1; transform: translateY(0); }
        }
        .ornament {
            font-size: 28px;
            letter-spacing: 8px;
            color: rgba(255,215,150,0.3);
            margin-bottom: 12px;
        }
        .salutation {
            font-size: 2.8rem;
            font-weight: 700;
            color: #f5e6d3;
            line-height: 1.2;
            margin-bottom: 4px;
        }
        .salutation .highlight { color: #f7c948; }
        .sub-greeting {
            font-size: 1rem;
            color: rgba(255,215,150,0.5);
            letter-spacing: 6px;
            margin-bottom: 28px;
            font-weight: 300;
        }
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,215,150,0.4), transparent);
            margin: 0 auto 28px;
        }
        .letter {
            text-align: left;
            color: rgba(255,245,235,0.9);
            font-size: 1.05rem;
            line-height: 2.1;
            padding: 0 4px;
            margin-bottom: 32px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }
        .letter p { margin-bottom: 14px; }
        .letter .em { color: #f7c948; font-weight: 500; }
        .signature {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-top: 1px solid rgba(255,215,150,0.08);
            padding-top: 24px;
            color: rgba(255,215,150,0.4);
            font-size: 0.9rem;
        }
        .signature .name { color: #f5e6d3; font-weight: 500; font-size: 1.05rem; }
        .signature .date { color: rgba(255,215,150,0.3); }
        .memory-btn {
            margin-top: 24px;
            padding: 12px 32px;
            border: 1px solid rgba(255,215,150,0.2);
            border-radius: 50px;
            background: transparent;
            color: rgba(255,215,150,0.6);
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.4s;
            letter-spacing: 2px;
        }
        .memory-btn:hover {
            background: rgba(255,215,150,0.08);
            border-color: rgba(255,215,150,0.4);
            color: #f5e6d3;
            transform: scale(1.02);
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            max-width: 480px;
            width: 100%;
            background: rgba(30,30,50,0.95);
            border-radius: 32px;
            padding: 32px 28px 28px;
            border: 1px solid rgba(255,215,150,0.1);
            text-align: center;
            animation: popUp 0.4s cubic-bezier(0.22,1,0.36,1);
        }
        @keyframes popUp {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-box .photo-area {
            width: 100%;
            aspect-ratio: 4/3;
            border-radius: 16px;
            margin-bottom: 20px;
            overflow: hidden;
            background: #2a3a4a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            color: rgba(255,215,150,0.2);
        }
        .modal-box .photo-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .modal-box .caption {
            color: rgba(255,245,235,0.7);
            font-size: 0.95rem;
            line-height: 1.8;
            margin-bottom: 16px;
        }
        .modal-box .close-btn {
            padding: 8px 28px;
            border: none;
            background: rgba(255,215,150,0.1);
            border-radius: 30px;
            color: rgba(255,215,150,0.6);
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
        }
        .modal-box .close-btn:hover {
            background: rgba(255,215,150,0.2);
            color: #f5e6d3;
        }
        .nav-btn {
            background: rgba(255,215,150,0.1);
            border: 1px solid rgba(255,215,150,0.15);
            color: rgba(255,215,150,0.5);
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
            font-family: inherit;
            margin: 0 4px;
        }
        .nav-btn:hover {
            background: rgba(255,215,150,0.2);
            color: #f5e6d3;
        }
        .photo-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .photo-counter {
            color: rgba(255,215,150,0.3);
            font-size: 0.8rem;
        }
        @media (max-width: 480px) {
            .card { padding: 30px 20px 28px; border-radius: 28px; }
            .salutation { font-size: 2.2rem; }
            .letter { font-size: 0.95rem; line-height: 2; }
        }
    </style>
</head>
<body>

<div id="glowContainer"></div>

<div class="card">
    <div class="ornament">✦ ✦ ✦</div>
    <div class="salutation">老爸，<span class="highlight">节日快乐</span></div>
    <div class="sub-greeting">— 父亲节 · 2026 —</div>
    <div class="divider"></div>

    <!-- ========================================================== -->
    <!-- 信件内容：改这里（每一段用 <p> 包起来）                      -->
    <!-- ========================================================== -->
    <div class="letter" id="letterContent">
        <p>小时候，总觉得您是超人，什么都会修，什么都不怕。</p>
        <p>后来才明白，您只是把所有的<span class="em">难</span>都留给了自己，<br>把所有的<span class="em">好</span>都给了我。</p>
        <p>您的话不多，但每一句都在我心里扎了根。<br>您从不夸我，但我每次回头看，您都在。</p>
        <p>现在我长大了，换我来做您的靠山。<br>虽然我可能还不太会表达，但您知道的——<br><span class="em">我爱您，爸。</span></p>
    </div>

    <div class="signature">
        <span class="name">—— 您的儿子</span>
        <span class="date">2026 年 夏</span>
    </div>

    <button class="memory-btn" id="memoryBtn">📷 翻开我们的回忆</button>
</div>

<!-- 弹窗：照片相册 -->
<div class="modal-overlay" id="memoryModal">
    <div class="modal-box">
        <div class="photo-area" id="photoDisplay">🖼️</div>
        <div class="photo-nav">
            <button class="nav-btn" id="prevBtn">‹ 上一张</button>
            <span class="photo-counter" id="photoCounter">1 / 1</span>
            <button class="nav-btn" id="nextBtn">下一张 ›</button>
        </div>
        <div class="caption" id="memoryCaption">我们的回忆</div>
        <button class="close-btn" id="closeModal">💛 关 闭</button>
    </div>
</div>

<script>
    // ==========================================================
    // ⭐ 配置区：只改这里，其他不要动
    // ==========================================================

    // 1. 信的内容（每一段用 <p> 包起来）
    const letterHTML = `
        <p>小时候，总觉得您是超人，什么都会修，什么都不怕。</p>
        <p>后来才明白，您只是把所有的<span class="em">难</span>都留给了自己，<br>把所有的<span class="em">好</span>都给了我。</p>
        <p>您的话不多，但每一句都在我心里扎了根。<br>您从不夸我，但我每次回头看，您都在。</p>
        <p>现在我长大了，换我来做您的靠山。<br>虽然我可能还不太会表达，但您知道的——<br><span class="em">我爱您，爸。</span></p>
    `;

    // 2. 照片列表
    //    📌 路径规则（假设 index.html 在仓库根目录）：
    //    - 照片和 index.html 同目录 → 'dad1.jpg'
    //    - 照片在 images 文件夹     → 'images/dad1.jpg'
    //    - 照片在 images/2024/ 下   → 'images/2024/dad1.jpg'
    const photos = [
        { url: 'images/dad1.jpg', caption: '你的爱，藏在每一次西餐厅的美味中' },
        { url: 'images/dad2.jpg', caption: '2023年，我们在北帝山' },
        { url: 'images/dad3.jpg', caption: '2024年的寒假，我们在武汉' },
        { url: 'images/dad4.jpg', caption: '2024年的暑假，我们在贵州荔波' },
        { url: 'images/dad5.jpg', caption: '2025年的暑假，我们在湖南张家界天门山' },
        { url: 'images/dad6.jpg', caption: '变化的是地点，不变的是你爱我的心，愿我们一家人永远平平安安，幸福美满！' }
    ];

    // ==========================================================
    // 以下代码不用改
    // ==========================================================

    document.getElementById('letterContent').innerHTML = letterHTML;

    let currentIndex = 0;
    const modal = document.getElementById('memoryModal');
    const photoDisplay = document.getElementById('photoDisplay');
    const captionEl = document.getElementById('memoryCaption');
    const counterEl = document.getElementById('photoCounter');

    function renderPhoto(index) {
        const p = photos[index];
        if (!p) return;
        photoDisplay.innerHTML = `<img src="${p.url}" alt="回忆照片">`;
        captionEl.textContent = p.caption;
        counterEl.textContent = `${index + 1} / ${photos.length}`;
    }

    document.getElementById('memoryBtn').addEventListener('click', function() {
        if (photos.length === 0) {
            photoDisplay.innerHTML = '📸 还没有照片';
            photoDisplay.style.fontSize = '3rem';
            captionEl.textContent = '下次记得放上我们的合照';
            modal.classList.add('active');
            return;
        }
        currentIndex = 0;
        renderPhoto(0);
        modal.classList.add('active');
        this.textContent = '💛 已打开回忆';
        setTimeout(() => { this.textContent = '📷 翻开我们的回忆'; }, 1500);
    });

    document.getElementById('prevBtn').addEventListener('click', function() {
        if (photos.length === 0) return;
        currentIndex = (currentIndex - 1 + photos.length) % photos.length;
        renderPhoto(currentIndex);
    });

    document.getElementById('nextBtn').addEventListener('click', function() {
        if (photos.length === 0) return;
        currentIndex = (currentIndex + 1) % photos.length;
        renderPhoto(currentIndex);
    });

    document.getElementById('closeModal').addEventListener('click', function() {
        modal.classList.remove('active');
    });

    modal.addEventListener('click', function(e) {
        if (e.target === this) this.classList.remove('active');
    });

    // 背景萤火虫
    (function createGlows() {
        const container = document.getElementById('glowContainer');
        for (let i = 0; i < 20; i++) {
            const dot = document.createElement('div');
            dot.className = 'glow';
            const size = 30 + Math.random() * 60;
            dot.style.width = size + 'px';
            dot.style.height = size + 'px';
            dot.style.left = Math.random() * 100 + '%';
            dot.style.animationDuration = (12 + Math.random() * 18) + 's';
            dot.style.animationDelay = (Math.random() * 20) + 's';
            container.appendChild(dot);
        }
    })();
</script>
</body>
</html>
